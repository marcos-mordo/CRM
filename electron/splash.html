<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>BrandHub</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,sans-serif;overflow:hidden}
  body{
    background: radial-gradient(circle at 30% 30%, #2563EB, #7C3AED 55%, #DB2777 110%);
    color:#fff;display:flex;align-items:center;justify-content:center;
    -webkit-app-region: drag;
  }
  .card{
    text-align:center; max-width:340px; padding:32px;
  }
  .logo{
    width:96px;height:96px;margin:0 auto 22px;
    background:#fff;border-radius:24px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    animation:pop .55s cubic-bezier(.22,1,.36,1);
  }
  .logo svg{width:64px;height:64px}
  h1{margin:0 0 6px;font-size:22px;letter-spacing:.5px;font-weight:700}
  p{margin:0 0 22px;opacity:.85;font-size:13px}
  .bar{
    height:4px;width:100%;background:rgba(255,255,255,.18);border-radius:99px;overflow:hidden;
  }
  .bar > div{
    height:100%;width:35%;background:#fff;border-radius:99px;
    animation:slide 1.3s ease-in-out infinite;
  }
  .status{margin-top:14px;font-size:11px;opacity:.7;min-height:14px;letter-spacing:.3px}
  @keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes slide{
    0%{transform:translateX(-100%)}
    100%{transform:translateX(285%)}
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#2563EB"/>
            <stop offset=".55" stop-color="#7C3AED"/>
            <stop offset="1" stop-color="#DB2777"/>
          </linearGradient>
        </defs>
        <rect width="64" height="64" rx="14" fill="url(#g)"/>
        <g stroke="#fff" stroke-opacity=".45" stroke-width="1.2" stroke-linecap="round">
          <line x1="32" y1="32" x2="48" y2="16"/>
          <line x1="32" y1="32" x2="51" y2="32"/>
          <line x1="32" y1="32" x2="48" y2="48"/>
        </g>
        <g fill="#fff">
          <circle cx="48" cy="16" r="3.2"/>
          <circle cx="51" cy="32" r="3.2" fill-opacity=".85"/>
          <circle cx="48" cy="48" r="3.2" fill-opacity=".7"/>
        </g>
        <path d="M16 14h11.5c5.3 0 8.5 2.6 8.5 7 0 3-1.7 4.8-3.7 5.5 2.6.6 4.7 2.6 4.7 6 0 4.7-3.5 7.5-9.2 7.5H16V14Zm5.5 4.6v6.1h5.2c2.7 0 4-1 4-3 0-2-1.3-3.1-4-3.1h-5.2Zm0 10.4v6.5h6c2.9 0 4.4-1.1 4.4-3.3 0-2.2-1.5-3.2-4.4-3.2h-6Z" fill="#fff"/>
      </svg>
    </div>
    <h1>BrandHub</h1>
    <p>CRM multi-marca para tu agencia</p>
    <div class="bar"><div></div></div>
    <div class="status" id="s">Iniciando servicios…</div>
  </div>
  <script>
    const stages = [
      'Iniciando servicios…',
      'Levantando base de datos…',
      'Compilando rutas…',
      'Cargando interfaz…',
    ];
    let i = 0;
    setInterval(() => {
      i = (i + 1) % stages.length;
      document.getElementById('s').textContent = stages[i];
    }, 2000);
  </script>
</body>
</html>
