<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>BrandHub</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  body{
    background:linear-gradient(135deg,#2563EB 0%,#7C3AED 55%,#DB2777 100%);
    color:#fff;display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .box{max-width:380px;width:100%;text-align:center}
  .logo{
    width:88px;height:88px;margin:0 auto 24px;background:#fff;border-radius:22px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 12px 36px rgba(0,0,0,.25);
  }
  h1{margin:0 0 8px;font-size:22px;letter-spacing:.2px}
  p{margin:0 0 20px;opacity:.9;font-size:14px;line-height:1.5}
  input{
    width:100%;padding:14px 16px;border:0;border-radius:12px;font-size:16px;
    background:rgba(255,255,255,.15);color:#fff;outline:none;
    -webkit-appearance:none;
  }
  input::placeholder{color:rgba(255,255,255,.55)}
  input:focus{background:rgba(255,255,255,.25);box-shadow:0 0 0 2px rgba(255,255,255,.4)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
  button{
    padding:14px;border-radius:12px;border:0;font-size:15px;font-weight:600;cursor:pointer;
    background:#fff;color:#7C3AED;transition:transform .1s;
  }
  button:active{transform:scale(.97)}
  button:disabled{opacity:.5;cursor:default}
  button.secondary{background:rgba(255,255,255,.15);color:#fff}
  .status{margin-top:14px;font-size:13px;min-height:20px}
  .ok{color:#86efac}
  .err{color:#fda4af}
  .hint{margin-top:24px;font-size:11px;opacity:.7;line-height:1.5}
</style>
</head>
<body>
  <div class="box">
    <div class="logo">
      <svg viewBox="0 0 64 64" width="56" height="56">
        <defs><linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#2563EB"/><stop offset=".55" stop-color="#7C3AED"/><stop offset="1" stop-color="#DB2777"/>
        </linearGradient></defs>
        <rect width="64" height="64" rx="14" fill="url(#g)"/>
        <g fill="#fff"><circle cx="48" cy="16" r="3.2"/><circle cx="51" cy="32" r="3.2" fill-opacity=".85"/><circle cx="48" cy="48" r="3.2" fill-opacity=".7"/></g>
        <path d="M16 14h11.5c5.3 0 8.5 2.6 8.5 7 0 3-1.7 4.8-3.7 5.5 2.6.6 4.7 2.6 4.7 6 0 4.7-3.5 7.5-9.2 7.5H16V14Zm5.5 4.6v6.1h5.2c2.7 0 4-1 4-3 0-2-1.3-3.1-4-3.1h-5.2Zm0 10.4v6.5h6c2.9 0 4.4-1.1 4.4-3.3 0-2.2-1.5-3.2-4.4-3.2h-6Z" fill="#fff"/>
      </svg>
    </div>
    <h1>Conecta a tu BrandHub</h1>
    <p>Introduce la URL del servidor de tu organización para empezar.</p>

    <input id="url" type="url" placeholder="https://brandhub.tuempresa.com"
           autocomplete="url" autocorrect="off" autocapitalize="none" inputmode="url" />

    <div class="row">
      <button class="secondary" id="test">Probar</button>
      <button id="go" disabled>Continuar</button>
    </div>

    <div class="status" id="status"></div>

    <div class="hint">
      Pídele la URL a tu administrador. Si no tenéis servidor aún, podéis
      desplegar gratis con <strong>Vercel + Neon</strong> en 5 minutos.
    </div>
  </div>

<script>
const KEY = 'brandhub_server_url';
const url = document.getElementById('url');
const test = document.getElementById('test');
const go = document.getElementById('go');
const status = document.getElementById('status');

// Pre-rellenar si ya existe
try {
  const prev = localStorage.getItem(KEY);
  if (prev) url.value = prev;
} catch {}

function clean(s) {
  s = s.trim().replace(/\/+$/, '');
  if (!/^https?:\/\//i.test(s)) s = 'https://' + s;
  return s;
}

test.onclick = async () => {
  if (!url.value) return;
  status.textContent = 'Probando...';
  status.className = 'status';
  go.disabled = true;
  try {
    const full = clean(url.value);
    const t0 = Date.now();
    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), 6000);
    const r = await fetch(full + '/api/health', { signal: ctrl.signal, cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    status.textContent = '✓ Conectado · ' + (Date.now() - t0) + 'ms';
    status.className = 'status ok';
    go.disabled = false;
  } catch (e) {
    status.textContent = '✗ No se pudo conectar: ' + (e.message || 'sin red');
    status.className = 'status err';
  }
};

go.onclick = () => {
  const full = clean(url.value);
  try { localStorage.setItem(KEY, full); } catch {}
  // Redirige a la app real
  window.location.href = full;
};

// Enter en el input = test
url.addEventListener('keydown', (e) => { if (e.key === 'Enter') test.click(); });
</script>
</body>
</html>
