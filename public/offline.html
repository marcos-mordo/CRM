<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sin conexión · BrandHub</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#0b1220;color:#e4e7eb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{max-width:420px;text-align:center;background:#111827;border:1px solid #1f2937;border-radius:16px;padding:32px}
    .icon{font-size:48px;margin-bottom:16px}
    h1{margin:0 0 8px;font-size:20px}
    p{margin:0 0 16px;color:#9ca3af;font-size:14px}
    button{background:#3b82f6;color:white;border:0;border-radius:8px;padding:10px 16px;font-size:14px;cursor:pointer}
    button:hover{background:#2563eb}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📵</div>
    <h1>Sin conexión</h1>
    <p>BrandHub necesita conexión para esta acción. Tus cambios se sincronizarán automáticamente al volver online.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
