<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bhBg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset=".55" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#DB2777"/>
    </linearGradient>
    <linearGradient id="bhGloss" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity=".25"/>
      <stop offset=".55" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="bhShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#000" flood-opacity=".25"/>
    </filter>
  </defs>

  <!-- Fondo redondeado con gradient diagonal -->
  <rect width="64" height="64" rx="14" fill="url(#bhBg)"/>
  <rect width="64" height="64" rx="14" fill="url(#bhGloss)"/>

  <!-- Conexiones radiantes (hub) -->
  <g stroke="#fff" stroke-opacity=".35" stroke-width="1.2" stroke-linecap="round">
    <line x1="32" y1="32" x2="48" y2="16"/>
    <line x1="32" y1="32" x2="51" y2="32"/>
    <line x1="32" y1="32" x2="48" y2="48"/>
  </g>

  <!-- Nodos satélite (marcas) -->
  <g fill="#fff" filter="url(#bhShadow)">
    <circle cx="48" cy="16" r="3.2"/>
    <circle cx="51" cy="32" r="3.2" fill-opacity=".85"/>
    <circle cx="48" cy="48" r="3.2" fill-opacity=".7"/>
  </g>

  <!-- "B" central tipográfica -->
  <path d="M16 14h11.5c5.3 0 8.5 2.6 8.5 7 0 3-1.7 4.8-3.7 5.5 2.6.6 4.7 2.6 4.7 6 0 4.7-3.5 7.5-9.2 7.5H16V14Zm5.5 4.6v6.1h5.2c2.7 0 4-1 4-3 0-2-1.3-3.1-4-3.1h-5.2Zm0 10.4v6.5h6c2.9 0 4.4-1.1 4.4-3.3 0-2.2-1.5-3.2-4.4-3.2h-6Z"
        fill="#fff" filter="url(#bhShadow)"/>
</svg>
