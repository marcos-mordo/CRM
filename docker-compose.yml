services:
  postgres:
    image: postgres:16-alpine
    container_name: brandhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: brandhub
      POSTGRES_PASSWORD: brandhub_dev_2026
      POSTGRES_DB: brandhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brandhub -d brandhub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: brandhub_postgres_data
